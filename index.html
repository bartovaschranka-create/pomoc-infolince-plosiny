<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#17191d">
  <title>Plošinový poradce | Zeppelin CZ</title>
  <link rel="stylesheet" href="styles.css?v=0.5.9">
</head>
<body>
  <main class="page-shell">
    <section class="panel smart-search section-block">
      <form id="smartSearchForm">
        <label class="field">
          <span>Chytré vyhledávání</span>
          <div class="smart-row">
            <input id="smartSearchInput" type="search" placeholder="např. hmotnost GS-3246, hmotnost GS-3246 + výrobní číslo">
            <button class="primary-button" type="submit">Hledat</button>
          </div>
        </label>
      </form>
    </section>

    <section id="categorySection" class="panel section-block">
      <div class="section-heading">
        <div><span class="step">1</span><h2>Vyberte kategorii</h2></div>
        <button id="showAllButton" class="text-button" type="button">Zobrazit celý katalog</button>
      </div>
      <div id="categoryGrid" class="category-grid"></div>
    </section>

    <section id="filterSection" class="panel section-block hidden">
      <div class="section-heading">
        <div><span class="step">2</span><h2>Zadejte požadavky</h2><p id="selectedCategoryLabel"></p></div>
        <button id="changeCategoryButton" class="text-button" type="button">Změnit kategorii</button>
      </div>
      <form id="filterForm">
        <div class="form-grid">
          <label class="field"><span>Provoz</span>
            <select id="environment">
              <option value="any">Bez omezení</option>
              <option value="indoor">Vnitřní</option>
              <option value="outdoor">Venkovní</option>
            </select>
          </label>
          <label class="field"><span>Minimální pracovní výška</span>
            <div class="input-unit"><input id="workingHeight" type="number" min="0" step="0.1" placeholder="např. 10"><em>m</em></div>
          </label>
          <label class="field"><span>Minimální boční dosah</span>
            <div class="input-unit"><input id="outreach" type="number" min="0" step="0.1" placeholder="bez omezení"><em>m</em></div>
          </label>
          <label class="field"><span>Pohon</span>
            <select id="drive">
              <option value="any">Bez omezení</option>
              <option value="electric">Elektrický / bateriový</option>
              <option value="diesel">Dieselový</option>
              <option value="hybrid">Kombinovaný</option>
            </select>
          </label>
          <label class="field"><span>Hmotnost stroje do</span>
            <div class="input-unit"><input id="maxWeight" type="number" min="0" step="1" placeholder="bez omezen&iacute;"><em>kg</em></div>
          </label>
          <label class="field checkbox-field">
            <input id="requiresStabilizers" type="checkbox">
            <span>Se stabiliz&aacute;tory</span>
          </label>
        </div>
        <div class="form-actions">
          <button class="primary-button" type="submit">Vyhledat vhodné plošiny</button>
          <button id="clearFiltersButton" class="secondary-button" type="button">Vymazat filtry</button>
        </div>
      </form>
    </section>

    <section id="resultsSection" class="section-block hidden">
      <div class="results-header">
        <div><p id="resultsStatus" class="eyebrow"></p><h2 id="resultsTitle">Výsledky</h2><p id="resultsDescription"></p></div>
      </div>
      <div id="resultsGrid" class="results-grid"></div>
      <div class="safety-note"><strong>Orientační výběr.</strong> Před potvrzením nabídky ověřte vhodnost konkrétního stroje a aktuální dostupnost.</div>
    </section>
  </main>

  <footer class="footer">
    <span>Aktuální dostupnost strojů na pobočkách aplikace neověřuje.</span>
  </footer>
  <div class="fixed-version">0.5.9</div>

  <script src="data/machines.js?v=0.5.9"></script>
  <script src="app.js?v=0.5.9"></script>
</body>
</html>
